<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PharmAssist — AI-powered pharmacy management." />
  <title>PharmAssist</title>
  <link rel="stylesheet" href="/css/app.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <header class="topnav" role="banner">
    <div class="topnav-inner">

      <a class="brand" href="#dashboard">
        <!-- Pill + Shield brand icon -->
        <svg class="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="8" fill="#1565C0"/>
          <!-- Shield -->
          <path d="M16 5L7 9v7c0 5 4 9.5 9 11 5-1.5 9-6 9-11V9L16 5z" fill="#1976D2" stroke="white" stroke-width="1.2"/>
          <!-- Pill inside shield -->
          <rect x="11" y="14" width="10" height="5" rx="2.5" fill="white" opacity="0.95"/>
          <rect x="16" y="14" width="5" height="5" rx="0" fill="#90CAF9" opacity="0.9"
                style="clip-path:inset(0 0 0 0 round 0 2.5px 2.5px 0)"/>
          <line x1="16" y1="14" x2="16" y2="19" stroke="#1565C0" stroke-width="0.8"/>
        </svg>
        <span class="brand-name">PharmAssist</span>
      </a>

      <nav class="nav-links" role="navigation" aria-label="Main navigation">
        <a class="nav-link active" data-page="dashboard"     href="#dashboard">Dashboard</a>
        <a class="nav-link"        data-page="prescriptions" href="#prescriptions">Prescriptions</a>
        <a class="nav-link"        data-page="inventory"     href="#inventory">Inventory</a>
        <a class="nav-link"        data-page="analytics"     href="#analytics">Analytics</a>
        <a class="nav-link"        data-page="history"       href="#history">History</a>
      </nav>

      <div class="nav-right">
        <button class="btn btn-ghost btn-sm" id="nav-settings-btn"
          onclick="openAppSettings()" title="Settings" aria-label="Open settings"
          style="color:rgba(255,255,255,0.75);padding:6px 8px;margin-right:2px">
          <i data-lucide="settings" style="width:16px;height:16px"></i>
        </button>
        <button class="nav-alerts-btn" id="alert-badge" style="display:none"
          onclick="navigateTo('dashboard')" title="View alerts">
          <span class="nav-alerts-dot"></span>
          <i data-lucide="alert-triangle" style="width:13px;height:13px"></i>
          <span id="alert-badge-count"></span> — <span id="alert-badge-label">Alerts</span>
        </button>
        <button class="btn btn-primary btn-sm" id="nav-upload-btn">
          <i data-lucide="scan-line" style="width:14px;height:14px"></i>
          New Prescription
        </button>
      </div>

    </div>
  </header>

  <main class="main-content" role="main">
    <div id="page-dashboard"     class="page active"></div>
    <div id="page-prescriptions" class="page"></div>
    <div id="page-inventory"     class="page"></div>
    <div id="page-analytics"     class="page"></div>
    <div id="page-history"       class="page"></div>
  </main>

  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/prescriptions.js"></script>
  <script src="/js/inventory.js"></script>
  <script src="/js/analytics.js"></script>
  <script src="/js/history.js"></script>
  <script src="/js/settings.js"></script>

</body>
</html>
